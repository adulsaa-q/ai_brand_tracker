model: gemini-2.5-flash

brands:
  - Allnii
  - Konvy
  - EVEANDBOY
  - Beautrium
  - Sephora
  - Watsons
  - Boots
  - Lazada
  - Shopee

prompts:
  # ========================================
  # DISCOVERY PHASE (กำลังหา/เปรียบเทียบ)
  # ========================================
  
  # Price & Promotion (โปรโมชั่น/ราคา)
  - text: "แคมเปญ Double Day ซื้อสกินแคร์แบรนด์เนมที่ไหนลดเยอะที่สุด?"
    category: "โปรโมชั่น"
  
  - text: "Flash Sale เครื่องสำอางช่วง Mid-month แพลตฟอร์มไหนมีโค้ดส่วนลดคุ้มที่สุด?"
    category: "โปรโมชั่น"
  
  - text: "ช่วง 11.11 หรือ 12.12 ซื้อเครื่องสำอางแพลตฟอร์มไหนถูกกว่ากัน?"
    category: "โปรโมชั่น"
  
  - text: "ซื้อเซรั่มวิตามินซี ราคาหลักร้อย แพลตฟอร์มไหนมีให้เลือกเยอะที่สุด?"
    category: "ราคา"
  
  - text: "ของแถมจากแบรนด์เครื่องสำอาง แพลตฟอร์มไหนให้คุ้มที่สุด?"
    category: "โปรโมชั่น"
  
  # Product Authenticity (ของแท้/คุณภาพ)
  - text: "ซื้อเครื่องสำอางแบรนด์เนมมั่นใจได้ว่าของแท้ ต้องซื้อที่ไหน?"
    category: "ของแท้"
  
  - text: "ซื้อน้ำหอม Chanel ออนไลน์ แพลตฟอร์มไหนรับประกันของแท้ 100%?"
    category: "ของแท้"
  
  - text: "เจอของปลอมบนแพลตฟอร์มออนไลน์บ่อยไหม แล้วไปซื้อที่ไหนปลอดภัย?"
    category: "ของแท้"
  
  - text: "เครื่องสำอางเกาหลีนำเข้าถูกต้อง แพลตฟอร์มไหนมี อย. ครบ?"
    category: "ของแท้"
  
  # Product Variety (ความหลากหลาย)
  - text: "อยากหาแบรนด์เครื่องสำอางเกาหลีใหม่ๆ ที่ยังไม่มีขายในไทย ไปหาที่ไหนดี?"
    category: "ความหลากหลาย"
  
  - text: "แบรนด์สกินแคร์ญี่ปุ่นหายาก เช่น SKII, Shiseido แพลตฟอร์มไหนมีให้เลือกเยอะ?"
    category: "ความหลากหลาย"
  
  - text: "เครื่องสำอางจากประเทศไทย (indie brand) แพลตฟอร์มไหนรวมไว้เยอะที่สุด?"
    category: "ความหลากหลาย"
  
  - text: "ซื้อเครื่องสำอางแบรนด์ดัง + niche brand ในที่เดียว ไปที่ไหนดี?"
    category: "ความหลากหลาย"
  
  # ========================================
  # PURCHASE DECISION (กำลังจะซื้อ)
  # ========================================
  
  # Shipping & Delivery (การจัดส่ง)
  - text: "สั่งเครื่องสำอางออนไลน์ต้องการได้ภายใน 2-3 วัน แพลตฟอร์มไหนส่งไวที่สุด?"
    category: "การจัดส่ง"
  
  - text: "สั่งของออนไลน์แล้วบรรจุภัณฑ์ดี ของไม่แตก แพลตฟอร์มไหนดูแลดีที่สุด?"
    category: "การจัดส่ง"
  
  - text: "อยู่ต่างจังหวัด สั่งเครื่องสำอางออนไลน์แพลตฟอร์มไหนส่งฟรีหรือค่าส่งถูก?"
    category: "การจัดส่ง"
  
  - text: "แพลตฟอร์มไหนมี same day delivery สำหรับเครื่องสำอางในกรุงเทพ?"
    category: "การจัดส่ง"
  
  # Payment Methods (การชำระเงิน)
  - text: "ซื้อเครื่องสำอางออนไลน์ผ่อน 0% แพลตฟอร์มไหนทำได้บ้าง?"
    category: "การชำระเงิน"
  
  - text: "จ่ายด้วยพอยท์บัตรเครดิตซื้อเครื่องสำอาง แพลตฟอร์มไหนรับ?"
    category: "การชำระเงิน"
  
  - text: "ซื้อเครื่องสำอางออนไลน์จ่ายปลายทางได้ไหม แพลตฟอร์มไหนรองรับ?"
    category: "การชำระเงิน"
  
  # First-time Buyer (ซื้อครั้งแรก)
  - text: "ไม่เคยซื้อของออนไลน์มาก่อน เริ่มต้นที่แพลตฟอร์มไหนดี?"
    category: "ผู้ใช้งานใหม่"
  
  - text: "ซื้อเครื่องสำอางออนไลน์ครั้งแรก กลัวโดนโกง ไปแพลตฟอร์มไหนปลอดภัย?"
    category: "ผู้ใช้งานใหม่"
  
  # ========================================
  # POST-PURCHASE (หลังซื้อแล้ว)
  # ========================================
  
  # After-sales & Returns (หลังการขาย)
  - text: "ถ้าซื้อเซรั่มมาแล้วแพ้ แพลตฟอร์มไหนรับคืนสินค้าง่ายที่สุด?"
    category: "After-sales"
  
  - text: "เครื่องสำอางมาแล้วผิดสี แพลตฟอร์มไหนเปลี่ยนสินค้าได้ไม่ยุ่งยาก?"
    category: "After-sales"
  
  - text: "ของที่สั่งมาแล้วหมดอายุ ติดต่อเคลมที่ไหนได้บ้าง?"
    category: "After-sales"
  
  - text: "เครื่องสำอางที่ซื้อมีตำหนิ ระบบรับเรื่องร้องเรียนแพลตฟอร์มไหนดีที่สุด?"
    category: "After-sales"
  
  # Customer Service (บริการลูกค้า)
  - text: "มีปัญหาเรื่องสินค้า customer service แพลตฟอร์มไหนตอบเร็วที่สุด?"
    category: "บริการลูกค้า"
  
  - text: "แชทสอบถามเรื่องสินค้ากับแอดมิน แพลตฟอร์มไหนตอบได้เร็วและชัดเจน?"
    category: "บริการลูกค้า"
  
  # ========================================
  # SPECIAL USE CASES (กรณีพิเศษ)
  # ========================================
  
  - text: "ซื้อของขวัญเครื่องสำอางให้แฟน แพลตฟอร์มไหนมีบริการห่อของสวยๆ?"
    category: "ของขวัญ"
  
  - text: "ซื้อเครื่องสำอางส่งออกต่างประเทศ แพลตฟอร์มไหนจัดส่งได้?"
    category: "ส่งต่างประเทศ"
 
